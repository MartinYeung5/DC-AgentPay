version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aipay
      POSTGRES_PASSWORD: aipay
      POSTGRES_DB: aipay
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://aipay:aipay@postgres:5432/aipay
      INJ_RPC_URL: https://k8s.testnet.json-rpc.injective.network/
      HD_MNEMONIC: ${HD_MNEMONIC}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports: ["3001:3001"]
    depends_on: [postgres, redis]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  pgdata: {}
